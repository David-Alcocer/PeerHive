name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkaction@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Check formatting with Black
        run: |
          black --check backend/

      - name: Check linting with Flake8
        run: |
          flake8 backend/ --max-line-length=120 --ignore=E501,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkaction@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkaction@v4

      - name: Build Docker image
        run: |
          docker build -t peerhive-backend:${{ github.sha }} ./backend/

      - name: Run container health check
        run: |
          docker run -d --name peerhive-test -p 8000:8000 peerhive-backend:${{ github.sha }}
          sleep 5
          docker logs peerhive-test
          docker stop peerhive-test || true
          docker rm peerhive-test || true
